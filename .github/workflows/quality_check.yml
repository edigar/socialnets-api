name: Quality check
on:
  workflow_call:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Install dependencies
        run: go mod tidy
      - name: Check if build
        run: go build ./cmd/api
      - name: Go vet
        run: go vet ./...
      - name: Go fmt
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            gofmt -s -l .
            echo "Please format Go code by running: go fmt ./..."
            exit 1 
          fi
      - name: Run tests with coverage
        id: coverage
        run: |
          go test ./... -coverprofile=coverage
          echo "percentage=$(go tool cover -func=coverage | grep total | awk '{print $3}')" >> $GITHUB_OUTPUT
      - name: Validate coverage
        run: |
          coverage=$(echo "${{ steps.coverage.outputs.percentage }}" | tr -d '%')
          threshold=50
          if (( $(echo "$coverage < $threshold" | bc -l) )); then
            echo "Test coverage (${coverage}%) is below ${threshold}%"
            exit 1
          fi
          echo "Test coverage (${coverage}%) meets the ${threshold}% threshold"
